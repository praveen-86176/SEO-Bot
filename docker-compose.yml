version: '3.8'

services:
  app:
    build: .
    container_name: seo-bot-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/seobotdb
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - seobot-network

  frontend:
    build: ./frontend
    container_name: seo-bot-frontend
    ports:
      - "5173:80"
    depends_on:
      - app
    networks:
      - seobot-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: seo-bot-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: seobotdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seobot-network

  redis:
    image: redis:7-alpine
    container_name: seo-bot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes
    networks:
      - seobot-network

volumes:
  postgres_data:
  redis_data:

networks:
  seobot-network:
    driver: bridge
